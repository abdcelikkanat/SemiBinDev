rule semibin_train_mean:
    conda: "semibiniclr"
    input:
        data = os.path.join(OUTPUT_DIR, "{sample}", "SemiBin2", "bins", "data.csv"),
        data_split = os.path.join(OUTPUT_DIR,"{sample}","SemiBin2","bins","data_split.csv"),
    output:
        mean_model_path = os.path.join(OUTPUT_DIR, "{sample}", "SemiBinICLR", "mean_models", "model.pt"),
    params:
        epochs_num = config["mean_epochs_num"],
        semibin2_path = os.path.join(ENV_DIR, "semibiniclr", "bin", "SemiBin2"),
        container_path = os.path.join(CONTAINER_PATH, ),
        output_dir = directory(os.path.join(OUTPUT_DIR, "{sample}", "SemiBinICLR", "mean_models")),
    resources:
        mem="100G",
        threads = 40,
        walltime="1-00:00:00",
        nodetype=config["partitions"]["cpu"],
    shell:
        """
        which {params.semibin2_path} & \
        apptainer exec --bind /projects:/projects {params.container_path} {params.semibin2_path} train_self \
            --data {input.data} \
            --data-split {input.data_split} \
            --threads {resources.threads} \
            --engine cpu \
            --output {params.output_dir} \
            --epochs {params.epochs_num} \
            --include_std 0
        """

